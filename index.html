<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>TASSY v3.8 Mobile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d0e12">
    
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlRBU1NZIFNjaGFjaCIsCiAgInNob3J0X25hbWUiOiAiVEFTU1kiLAogICJzdGFydF91cmwiOiAiaW5kZXguaHRtbCIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzBkMGUxMiIsCiAgInRoZW1lX2NvbG9yIjogIiMwZDBlMTIiLAogICJvcmllbnRhdGlvbiI6ICJwb3J0cmFpdCIKfQ==">

    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { 
            background: #0d0e12; color: #e2e8f0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 15px; overflow-x: hidden;
        }
        .container { display: flex; flex-direction: column; align-items: center; max-width: 340px; width: 100%; }
        .tassy-label { color: #f1c40f; font-weight: 800; font-size: 22px; letter-spacing: 3px; margin-bottom: 12px; text-shadow: 0 0 10px rgba(241,196,15,0.3); }
        
        .bar-wrap { 
            width: 100%; height: 14px; background: #1e293b; border-radius: 20px; 
            overflow: hidden; margin-bottom: 15px; border: 1px solid #334155; position: relative; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        #fill { height: 100%; width: 50%; background: #ffffff; transition: width 0.4s ease; position: absolute; box-shadow: 0 0 8px #fff; }
        #eval-val { 
            position: absolute; width: 100%; text-align: center; font-size: 11px; 
            line-height: 14px; font-weight: 700; color: #f1c40f; z-index: 5; text-shadow: 1px 1px 3px #000;
        }

        #myBoard { 
            width: 100%; border-radius: 8px; overflow: hidden;
            border: 4px solid #1e293b; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.7);
            touch-action: none;
        }

        .info-row { 
            width: 100%; display: flex; justify-content: space-between; 
            margin-top: 10px; font-size: 14px; color: #94a3b8; font-weight: 500;
        }
        #status-left { background: #1e293b; padding: 4px 10px; border-radius: 6px; border: 1px solid #334155; color: #f1c40f; }

        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; margin-top: 15px; }
        button { 
            padding: 12px 5px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 12px; 
            background: #1e293b; color: #e2e8f0; border: 1px solid #334155; transition: all 0.2s;
        }
        button:active { transform: scale(0.95); background: #334155; }
        .btn-hint { background: rgba(241, 196, 15, 0.15); color: #f1c40f; border: 1px solid #f1c40f; }
        .btn-reset { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border: 1px solid #e74c3c; }

        .menu-card {
            background: #111827; border: 1px solid #1e293b; padding: 30px; border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); text-align: center;
        }
        .btn-start { width: 160px; height: 50px; margin: 8px; font-size: 15px; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px; }

        .check-sq { box-shadow: inset 0 0 15px 5px rgba(231, 76, 60, 0.8) !important; background: #5c1d1d !important; }
        .hint-glow { box-shadow: inset 0 0 15px 5px rgba(46, 204, 113, 0.8) !important; }
    </style>
</head>
<body>

    <div class="container">
        <div id="start-menu" class="menu-card">
            <h1 style="color:#f1c40f; font-size: 42px; margin: 0 0 5px 0; font-weight:900; letter-spacing:4px;">TASSY</h1>
            <p style="color:#64748b; font-size:14px; margin-bottom:25px;">v3.8 Mobile Offline</p>
            <button class="btn-start" onclick="startGame('w')" style="background:#fff; color:#000; border:none;">Weiß</button><br>
            <button class="btn-start" onclick="startGame('b')" style="background:#1e293b; color:#fff;">Schwarz</button>
        </div>

        <div id="game-ui" style="display: none; width: 100%;">
            <div class="tassy-label">TASSY</div>
            <div class="bar-wrap">
                <div id="eval-val">0.0</div>
                <div id="fill"></div>
            </div>
            <div id="myBoard"></div>
            <div class="info-row">
                <div id="status-left">Bereit.</div>
            </div>
            <div class="controls">
                <button onclick="doUndo()">RÜCKZUG</button>
                <button class="btn-hint" onclick="doHint()">TIPP</button>
                <button class="btn-reset" onclick="resetGame()">RESET</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        var game = new Chess();
        var board = null;
        var playerColor = 'w';
        var isLookingForHint = false;
        var isEvalCalculation = false; 
        var stockfish = null;

        // Offline-Vorbereitung: Wir laden Stockfish aus dem gleichen Verzeichnis!
        function initStockfish() {
            try {
                // Nutzt die lokale Datei für echten Offline-Betrieb auf dem Handy
                stockfish = new Worker('stockfish.js');
                
                stockfish.onmessage = function(event) {
                    let line = event.data;
                    
                    if (line.indexOf('bestmove') > -1) {
                        if (isEvalCalculation) {
                            isEvalCalculation = false;
                            return;
                        }
                        let moveUCI = line.split(' ')[1];
                        if (moveUCI && moveUCI !== '(none)') {
                            if (isLookingForHint) {
                                highlightHint(moveUCI);
                                isLookingForHint = false;
                            } else {
                                game.move({ from: moveUCI.substring(0,2), to: moveUCI.substring(2,4), promotion: 'q' });
                                board.position(game.fen());
                                updateUI();
                            }
                        }
                    }
                    
                    if (line.indexOf('info depth') > -1) {
                        let parts = line.split(' ');
                        let score = 0;
                        if (line.indexOf('cp') > -1) {
                            let cpIndex = parts.indexOf('cp');
                            score = parseInt(parts[cpIndex + 1]) / 100;
                            if (game.turn() === 'b') score = -score;
                            updateEvalBar(score, false);
                        } else if (line.indexOf('mate') > -1) {
                            let mateIndex = parts.indexOf('mate');
                            let mateInZuegen = parseInt(parts[mateIndex + 1]);
                            if (game.turn() === 'b') mateInZuegen = -mateInZuegen;
                            updateEvalBar(mateInZuegen, true);
                        }
                    }
                };
            } catch(e) {
                console.error("Stockfish Fehler:", e);
                alert("Bitte lade die 'stockfish.js' Datei herunter, damit die Engine offline funktioniert!");
            }
        }

        function startGame(color) {
            playerColor = color;
            document.getElementById('start-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            
            initStockfish(); // Engine starten

            board = Chessboard('myBoard', {
                draggable: true,
                position: 'start',
                orientation: playerColor === 'w' ? 'white' : 'black',
                onDrop: handleMove,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });

            game.reset();
            updateUI();

            if (playerColor === 'b') {
                askStockfishToMove();
            }
        }

        function handleMove(source, target) {
            if (game.turn() !== playerColor) return 'snapback';
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            updateUI();
            if (!game.game_over()) {
                setTimeout(askStockfishToMove, 250);
            }
        }

        function askStockfishToMove() {
            if(!stockfish) return;
            isEvalCalculation = false;
            stockfish.postMessage('position fen ' + game.fen());
            stockfish.postMessage('go depth 10'); // Mobil-optimiert für Akku & Speed
        }

        function updateUI() {
            $('.square-55d63').removeClass('check-sq');
            if (game.in_check()) {
                let turn = game.turn();
                for (let i = 0; i < 8; i++) {
                    for (let j = 0; j < 8; j++) {
                        let squareName = String.fromCharCode(97 + i) + (j + 1);
                        let piece = game.get(squareName);
                        if (piece && piece.type === 'k' && piece.color === turn) {
                            $('.square-' + squareName).addClass('check-sq');
                        }
                    }
                }
            }

            if (game.in_checkmate()) $('#status-left').text("MATT!");
            else if (game.in_draw()) $('#status-left').text("REMIS!");
            else $('#status-left').text(game.turn() === playerColor ? "Dein Zug." : "Tassy überlegt...");

            if (!game.game_over() && game.turn() === playerColor && stockfish) {
                isEvalCalculation = true;
                stockfish.postMessage('position fen ' + game.fen());
                stockfish.postMessage('go depth 6');
            }
        }

        function updateEvalBar(score, isMate) {
            if (isMate) {
                $('#eval-val').text("M" + Math.abs(score));
                $('#fill').css('width', score > 0 ? '100%' : '0%');
            } else {
                $('#eval-val').text(score > 0 ? "+" + score.toFixed(1) : score.toFixed(1));
                let percentage = 50 + (score * 5);
                $('#fill').css('width', Math.max(5, Math.min(95, percentage)) + '%');
            }
        }

        function doUndo() {
            game.undo(); game.undo();
            board.position(game.fen());
            updateUI();
        }

        function doHint() {
            if(!stockfish) return;
            isLookingForHint = true;
            isEvalCalculation = false;
            stockfish.postMessage('position fen ' + game.fen());
            stockfish.postMessage('go depth 10');
        }

        function highlightHint(move) {
            let from = move.substring(0, 2);
            let to = move.substring(2, 4);
            $('.square-' + from + ', .square-' + to).addClass('hint-glow');
            setTimeout(() => $('.square-' + from + ', .square-' + to).removeClass('hint-glow'), 1200);
        }

        function resetGame() { location.reload(); }

        // --- SERVICE WORKER REGISTRIERUNG (Für Offline-Betrieb) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('service-worker.js').then(function(reg) {
                    console.log('Offline-ServiceWorker registriert!', reg.scope);
                }).catch(function(err) {
                    console.log('ServiceWorker fehlgeschlagen: ', err);
                });
            });
        }
    </script>
</body>
</html>
