<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>TASSY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background: #0d0e12; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 10px; }
        .container { max-width: 340px; width: 100%; text-align: center; }
        h1 { color: #f1c40f; margin-bottom: 15px; font-size: 24px; }
        #myBoard { width: 100%; border-radius: 5px; border: 3px solid #1e293b; }
        #status { margin: 15px 0; font-weight: bold; color: #f1c40f; }
        .btn { width: 100%; padding: 12px; background: #1e293b; color: #fff; border: 1px solid #334155; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TASSY</h1>
        <div id="myBoard"></div>
        <div id="status">Wähle deinen Zug...</div>
        <button class="btn" onclick="location.reload()">NEUSTART</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js"></script>

    <script>
        var game = new Chess();
        var board = null;
        var engine = null;

        function initEngine() {
            if (typeof STOCKFISH === 'function') {
                engine = STOCKFISH();
                engine.onmessage = function(event) {
                    var line = (typeof event === 'object' && event.data) ? event.data : event;
                    if (line.indexOf('bestmove') > -1) {
                        var moveUCI = line.split(' ')[1];
                        if (moveUCI && moveUCI !== '(none)') {
                            game.move({ from: moveUCI.substring(0,2), to: moveUCI.substring(2,4), promotion: 'q' });
                            board.position(game.fen());
                            updateStatus();
                        }
                    }
                };
                engine.postMessage('uci');
                engine.postMessage('isready');
            } else {
                $('#status').text("Ladefehler Engine!");
            }
        }

        function handleMove(source, target) {
            if (game.turn() !== 'w') return 'snapback';
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            updateStatus();
            if (!game.game_over()) {
                setTimeout(askEngine, 250);
            }
        }

        function askEngine() {
            if (!engine) return;
            $('#status').text("Tassy überlegt...");
            engine.postMessage('position fen ' + game.fen());
            engine.postMessage('go depth 10 movetime 800');
        }

        function updateStatus() {
            if (game.in_checkmate()) $('#status').text("MATT!");
            else if (game.in_draw()) $('#status-left').text("REMIS!");
            else $('#status').text(game.turn() === 'w' ? "Du bist am Zug (Weiß)." : "Tassy überlegt...");
        }

        // Start
        initEngine();
        board = Chessboard('myBoard', {
            draggable: true,
            position: 'start',
            onDrop: handleMove,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').catch(e => console.log(e));
        }
    </script>
</body>
</html>
