<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>TASSY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: #0d0e12; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 10px; overflow: hidden; }
        .container { max-width: 340px; width: 100%; text-align: center; }
        h1 { color: #f1c40f; margin: 0 0 15px 0; font-size: 24px; font-family: sans-serif; }
        #myBoard { width: 100%; border-radius: 5px; border: 3px solid #1e293b; }
        #status { margin: 15px 0; font-weight: bold; color: #f1c40f; font-family: sans-serif; }
        .btn { width: 100%; padding: 12px; background: #1e293b; color: #fff; border: 1px solid #334155; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .highlight { box-shadow: inset 0 0 3px 3px yellow !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TASSY</h1>
        <div id="myBoard"></div>
        <div id="status">Figur anklicken...</div>
        <button class="btn" onclick="location.reload()">NEUSTART</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        var game = new Chess();
        var board = null;
        var stockfish = null;
        var sourceSquare = null;

        function initEngine() {
            try {
                stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
                stockfish.onmessage = function(event) {
                    var line = event.data;
                    if (line.indexOf('bestmove') > -1) {
                        var moveUCI = line.split(' ')[1];
                        if (moveUCI && moveUCI !== '(none)') {
                            game.move({ from: moveUCI.substring(0,2), to: moveUCI.substring(2,4), promotion: 'q' });
                            board.position(game.fen());
                            updateStatus();
                        }
                    }
                };
                stockfish.postMessage('uci');
                stockfish.postMessage('isready');
            } catch (e) {
                $('#status').text("Engine-Ladefehler!");
            }
        }

        function removeHighlights() {
            $('#myBoard .square-55d63').removeClass('highlight');
        }

        function onSquareClick(square) {
            if (game.turn() !== 'w' || game.game_over()) return;

            // Wenn noch keine Figur ausgewählt ist
            if (sourceSquare === null) {
                var piece = game.get(square);
                if (piece && piece.color === 'w') {
                    sourceSquare = square;
                    removeHighlights();
                    $('.square-' + square).addClass('highlight');
                }
            } else {
                // Wenn die gleiche Figur noch mal geklickt wird -> Abwahl
                if (sourceSquare === square) {
                    sourceSquare = null;
                    removeHighlights();
                    return;
                }

                // Zug ausführen
                var move = game.move({ from: sourceSquare, to: square, promotion: 'q' });
                sourceSquare = null;
                removeHighlights();

                if (move === null) {
                    // Falls es ein ungültiger Zug war, schauen ob stattdessen eine andere eigene Figur geklickt wurde
                    var piece = game.get(square);
                    if (piece && piece.color === 'w') {
                        sourceSquare = square;
                        $('.square-' + square).addClass('highlight');
                    }
                    return;
                }

                board.position(game.fen());
                updateStatus();

                if (!game.game_over()) {
                    setTimeout(askEngine, 300);
                }
            }
        }

        function askEngine() {
            if (!stockfish) return;
            $('#status').text("Tassy überlegt...");
            stockfish.postMessage('position fen ' + game.fen());
            stockfish.postMessage('go depth 10 movetime 800');
        }

        function updateStatus() {
            if (game.in_checkmate()) $('#status').text("MATT!");
            else if (game.in_draw()) $('#status').text("REMIS!");
            else $('#status').text(game.turn() === 'w' ? "Du bist am Zug (Weiß)." : "Tassy überlegt...");
        }

        initEngine();
        
        board = Chessboard('myBoard', {
            draggable: false, // ZIEHEN DEAKTIVIERT gegen das Wackeln
            position: 'start',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        });

        // Klick-Event für die Felder registrieren
        $('#myBoard').on('click', '.square-55d63', function() {
            var square = $(this).attr('data-square');
            onSquareClick(square);
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').catch(e => console.log(e));
        }
    </script>
</body>
</html>
